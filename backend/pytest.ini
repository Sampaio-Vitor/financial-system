[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=50
filterwarnings =
    ignore::DeprecationWarning
markers =
    integration: integration tests hitting the DB and routers
    unit: pure unit tests
