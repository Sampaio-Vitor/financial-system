# Dev overrides — auto-loaded by `docker compose up`

services:
  mysql:
    ports:
      - "3307:3306"

  backend:
    user: root
    environment:
      DATABASE_URL: mysql+aiomysql://portfolio_user:portfolio_pass@mysql:3306/portfolio
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      target: development
    user: root
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_URL: http://backend:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
