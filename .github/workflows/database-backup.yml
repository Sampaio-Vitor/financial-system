name: Weekly Database Backup

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

concurrency:
  group: financial-system-database-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Create production backup on VPS
        uses: appleboy/ssh-action@v1
        env:
          APP_DIR: ${{ secrets.VPS_APP_DIR }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_DEPLOY_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: APP_DIR
          script: |
            set -euo pipefail
            BACKUP_DIR="${APP_DIR}/backups"
            BACKUP_FILE="financial-system-mysql-latest.sql.gz"
            COMPOSE_FILES="-f docker-compose.yml -f docker-compose.prod.yml"

            mkdir -p "${BACKUP_DIR}"

            cd "${APP_DIR}"

            tmp_file="${BACKUP_DIR}/${BACKUP_FILE}.tmp"
            final_file="${BACKUP_DIR}/${BACKUP_FILE}"
            checksum_file="${BACKUP_DIR}/${BACKUP_FILE}.sha256"
            timestamp_file="${BACKUP_DIR}/${BACKUP_FILE}.timestamp"

            sudo docker compose ${COMPOSE_FILES} exec -T mysql sh -lc 'exec mysqldump --single-transaction --quick --no-tablespaces --routines --triggers --events -u"$MYSQL_USER" -p"$MYSQL_PASSWORD" --databases "$MYSQL_DATABASE"' | gzip -9 > "${tmp_file}"
            sha256sum "${tmp_file}" > "${checksum_file}.tmp"
            date -u +'%Y-%m-%dT%H:%M:%SZ' > "${timestamp_file}.tmp"
            mv "${tmp_file}" "${final_file}"
            mv "${checksum_file}.tmp" "${checksum_file}"
            mv "${timestamp_file}.tmp" "${timestamp_file}"
            ls -lh "${final_file}" "${checksum_file}" "${timestamp_file}"
