name: Weekly Database Backup

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

concurrency:
  group: financial-system-database-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      APP_DIR: ${{ secrets.VPS_APP_DIR }}
      BACKUP_PREFIX: financial-system-mysql
      COMPOSE_FILES: -f docker-compose.yml -f docker-compose.prod.yml
      DEPLOY_TARGET: ${{ secrets.VPS_DEPLOY_USER }}@${{ secrets.VPS_HOST }}
      GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${VPS_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Install rclone
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Configure Google Drive remote
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          service_account_file="${RUNNER_TEMP}/gdrive-service-account.json"
          printf '%s' "${GDRIVE_SERVICE_ACCOUNT_JSON}" > "${service_account_file}"
          chmod 600 "${service_account_file}"
          rclone config create backup_drive drive \
            scope drive \
            service_account_file "${service_account_file}" \
            root_folder_id "${GDRIVE_FOLDER_ID}"

      - name: Dump production database
        id: dump
        run: |
          set -euo pipefail
          timestamp="$(date -u +'%Y%m%dT%H%M%SZ')"
          archive_name="${BACKUP_PREFIX}-${timestamp}.sql.gz"
          archive_path="${RUNNER_TEMP}/${archive_name}"
          checksum_path="${archive_path}.sha256"

          ssh "${DEPLOY_TARGET}" "cd \"${APP_DIR}\" && sudo docker compose ${COMPOSE_FILES} exec -T mysql sh -lc 'exec mysqldump --single-transaction --quick --routines --triggers --events -u\"\$MYSQL_USER\" -p\"\$MYSQL_PASSWORD\" --databases \"\$MYSQL_DATABASE\"'" | gzip -9 > "${archive_path}"

          sha256sum "${archive_path}" > "${checksum_path}"

          {
            echo "archive_name=${archive_name}"
            echo "archive_path=${archive_path}"
            echo "checksum_path=${checksum_path}"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload backup to Google Drive
        run: |
          set -euo pipefail
          rclone copyto "${{ steps.dump.outputs.archive_path }}" "backup_drive:${{ steps.dump.outputs.archive_name }}"
          rclone copyto "${{ steps.dump.outputs.checksum_path }}" "backup_drive:${{ steps.dump.outputs.archive_name }}.sha256"

      - name: Prune old backups
        run: |
          set -euo pipefail
          mapfile -t backups < <(rclone lsf backup_drive: --files-only --include "${BACKUP_PREFIX}-*.sql.gz" | sort)
          keep=12

          if [ "${#backups[@]}" -le "${keep}" ]; then
            exit 0
          fi

          for old_backup in "${backups[@]:0:${#backups[@]}-${keep}}"; do
            rclone deletefile "backup_drive:${old_backup}"
            rclone deletefile "backup_drive:${old_backup}.sha256" || true
          done
