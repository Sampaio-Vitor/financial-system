name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: backend (pytest + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run pytest
        run: pytest
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend-unit:
    name: frontend (vitest + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend-unit]
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: portfolio
          MYSQL_USER: portfolio_user
          MYSQL_PASSWORD: portfolio_pass
          MYSQL_ROOT_PASSWORD: rootpass
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uportfolio_user -pportfolio_pass"
          --health-interval=10s --health-timeout=5s --health-retries=20
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      DATABASE_URL: mysql+aiomysql://portfolio_user:portfolio_pass@127.0.0.1:3307/portfolio
      SECRET_KEY: ci-secret-key-do-not-use-in-prod
      ENCRYPTION_KEY: ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=
      CORS_ORIGINS: http://localhost:3000
      CSRF_TRUSTED_ORIGINS: http://localhost:3000
      REDIS_URL: redis://localhost:6379/0
      API_DOCS_ENABLED: "false"
      TURNSTILE_REQUIRED: "false"
      API_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend
        working-directory: backend
        run: |
          pip install -r requirements.txt
      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head
      - name: Start backend
        working-directory: backend
        run: |
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &
          for i in {1..30}; do curl -fsS http://localhost:8000/api/health && break; sleep 2; done
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Run E2E
        working-directory: frontend
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report
