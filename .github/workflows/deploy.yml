name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Next.js build
        run: npm run build
        working-directory: frontend
        env:
          API_URL: http://backend:8000

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: ENCRYPTION_KEY
          script: |
            cd /root/financial-system
            set -e
            git pull origin main
            touch .env
            if grep -q '^ENCRYPTION_KEY=' .env; then
              sed -i "s|^ENCRYPTION_KEY=.*|ENCRYPTION_KEY=${ENCRYPTION_KEY}|" .env
            else
              printf '\nENCRYPTION_KEY=%s\n' "${ENCRYPTION_KEY}" >> .env
            fi
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d mysql
            until docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T mysql mysqladmin ping -h localhost --silent; do
              sleep 2
            done
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T mysql sh -lc '
              HAS_ALEMBIC=$(MYSQL_PWD="${MYSQL_PASSWORD}" mysql -N -B -u"${MYSQL_USER}" -D "${MYSQL_DATABASE}" -e "
                SELECT COUNT(*)
                FROM information_schema.tables
                WHERE table_schema = DATABASE() AND table_name = '\''alembic_version'\''
              ")
              if [ "${HAS_ALEMBIC}" -gt 0 ]; then
                MYSQL_PWD="${MYSQL_PASSWORD}" mysql -u"${MYSQL_USER}" -D "${MYSQL_DATABASE}" -e "
                  ALTER TABLE alembic_version MODIFY version_num VARCHAR(64) NOT NULL
                "
              fi
            '
            docker compose -f docker-compose.yml -f docker-compose.prod.yml run --rm --entrypoint="" backend python -m alembic upgrade head
            docker compose -f docker-compose.yml -f docker-compose.prod.yml run --rm --entrypoint="" backend python scripts/seed_user.py
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            docker image prune -f
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
