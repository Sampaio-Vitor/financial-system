name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Next.js build
        run: npm run build
        working-directory: frontend
        env:
          API_URL: http://backend:8000

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_DEPLOY_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: APP_DIR,MYSQL_ROOT_PASSWORD,MYSQL_DATABASE,MYSQL_USER,MYSQL_PASSWORD,SECRET_KEY,ADMIN_USERNAME,ADMIN_PASSWORD,ENCRYPTION_KEY,TURNSTILE_SECRET_KEY,NEXT_PUBLIC_TURNSTILE_SITE_KEY,GEMINI_API_KEY,VAPID_PUBLIC_KEY,VAPID_PRIVATE_KEY,VAPID_SUBJECT
          script: |
            cd "${APP_DIR}"
            set -e
            DOCKER_BIN="$(command -v docker)"
            git fetch origin main
            git reset --hard origin/main
            rm -f .env
            export DATABASE_URL="mysql+aiomysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}"
            export CORS_ORIGINS="https://cofrinhogordinho.uk"
            export CSRF_TRUSTED_ORIGINS="https://cofrinhogordinho.uk"
            export TURNSTILE_REQUIRED="true"
            export API_DOCS_ENABLED="false"
            export SESSION_COOKIE_SECURE="true"
            export SESSION_COOKIE_SAMESITE="strict"
            export OCR_MODEL="gemini-2.5-flash-lite"
            compose() {
              sudo --preserve-env=DATABASE_URL,MYSQL_ROOT_PASSWORD,MYSQL_DATABASE,MYSQL_USER,MYSQL_PASSWORD,SECRET_KEY,ADMIN_USERNAME,ADMIN_PASSWORD,ENCRYPTION_KEY,CORS_ORIGINS,CSRF_TRUSTED_ORIGINS,TURNSTILE_SECRET_KEY,NEXT_PUBLIC_TURNSTILE_SITE_KEY,TURNSTILE_REQUIRED,API_DOCS_ENABLED,SESSION_COOKIE_SECURE,SESSION_COOKIE_SAMESITE,GEMINI_API_KEY,OCR_MODEL,VAPID_PUBLIC_KEY,VAPID_PRIVATE_KEY,VAPID_SUBJECT "${DOCKER_BIN}" compose -f docker-compose.yml -f docker-compose.prod.yml "$@"
            }
            compose build
            compose start mysql || compose up -d mysql
            until compose exec -T mysql mysqladmin ping -h localhost --silent; do
              sleep 2
            done
            compose exec -T mysql sh -lc '
              HAS_ALEMBIC=$(MYSQL_PWD="${MYSQL_PASSWORD}" mysql -N -B -u"${MYSQL_USER}" -D "${MYSQL_DATABASE}" -e "
                SELECT COUNT(*)
                FROM information_schema.tables
                WHERE table_schema = DATABASE() AND table_name = '\''alembic_version'\''
              ")
              if [ "${HAS_ALEMBIC}" -gt 0 ]; then
                MYSQL_PWD="${MYSQL_PASSWORD}" mysql -u"${MYSQL_USER}" -D "${MYSQL_DATABASE}" -e "
                  ALTER TABLE alembic_version MODIFY version_num VARCHAR(64) NOT NULL
                "
              fi
            '
            compose run --rm --entrypoint="" backend sh -lc 'PYTHONPATH=/app alembic upgrade head'
            compose run --rm --entrypoint="" backend sh -lc 'PYTHONPATH=/app python scripts/seed_user.py'
            compose up -d redis backend worker frontend caddy
            sudo "${DOCKER_BIN}" image prune -f
        env:
          APP_DIR: ${{ secrets.VPS_APP_DIR }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
