name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Next.js build
        run: npm run build
        working-directory: frontend
        env:
          API_URL: http://backend:8000

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_DEPLOY_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: APP_DIR,MYSQL_ROOT_PASSWORD,MYSQL_DATABASE,MYSQL_USER,MYSQL_PASSWORD,SECRET_KEY,ADMIN_USERNAME,ADMIN_PASSWORD,ENCRYPTION_KEY,TURNSTILE_SECRET_KEY,NEXT_PUBLIC_TURNSTILE_SITE_KEY,GEMINI_API_KEY,VAPID_PUBLIC_KEY,VAPID_PRIVATE_KEY,VAPID_SUBJECT
          script: |
            cd "${APP_DIR}"
            set -e
            DOCKER_BIN="$(command -v docker)"
            git fetch origin main
            git reset --hard origin/main
            umask 077
            : > .env
            write_env_var() {
              printf '%s=%s\n' "$1" "$2" >> .env
            }
            write_env_var DATABASE_URL "mysql+aiomysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}"
            write_env_var MYSQL_ROOT_PASSWORD "${MYSQL_ROOT_PASSWORD}"
            write_env_var MYSQL_DATABASE "${MYSQL_DATABASE}"
            write_env_var MYSQL_USER "${MYSQL_USER}"
            write_env_var MYSQL_PASSWORD "${MYSQL_PASSWORD}"
            write_env_var SECRET_KEY "${SECRET_KEY}"
            write_env_var ADMIN_USERNAME "${ADMIN_USERNAME}"
            write_env_var ADMIN_PASSWORD "${ADMIN_PASSWORD}"
            write_env_var ENCRYPTION_KEY "${ENCRYPTION_KEY}"
            write_env_var CORS_ORIGINS "https://cofrinhogordinho.uk"
            write_env_var CSRF_TRUSTED_ORIGINS "https://cofrinhogordinho.uk"
            write_env_var TURNSTILE_SECRET_KEY "${TURNSTILE_SECRET_KEY}"
            write_env_var NEXT_PUBLIC_TURNSTILE_SITE_KEY "${NEXT_PUBLIC_TURNSTILE_SITE_KEY}"
            write_env_var TURNSTILE_REQUIRED "true"
            write_env_var API_DOCS_ENABLED "false"
            write_env_var SESSION_COOKIE_SECURE "true"
            write_env_var SESSION_COOKIE_SAMESITE "strict"
            write_env_var GEMINI_API_KEY "${GEMINI_API_KEY}"
            write_env_var OCR_MODEL "gemini-2.5-flash-lite"
            write_env_var VAPID_PUBLIC_KEY "${VAPID_PUBLIC_KEY}"
            write_env_var VAPID_PRIVATE_KEY "${VAPID_PRIVATE_KEY}"
            write_env_var VAPID_SUBJECT "${VAPID_SUBJECT}"
            sudo "${DOCKER_BIN}" compose -f docker-compose.yml -f docker-compose.prod.yml build
            sudo "${DOCKER_BIN}" compose -f docker-compose.yml -f docker-compose.prod.yml start mysql || sudo "${DOCKER_BIN}" compose -f docker-compose.yml -f docker-compose.prod.yml up -d mysql
            until sudo "${DOCKER_BIN}" compose -f docker-compose.yml -f docker-compose.prod.yml exec -T mysql mysqladmin ping -h localhost --silent; do
              sleep 2
            done
            sudo "${DOCKER_BIN}" compose -f docker-compose.yml -f docker-compose.prod.yml exec -T mysql sh -lc '
              HAS_ALEMBIC=$(MYSQL_PWD="${MYSQL_PASSWORD}" mysql -N -B -u"${MYSQL_USER}" -D "${MYSQL_DATABASE}" -e "
                SELECT COUNT(*)
                FROM information_schema.tables
                WHERE table_schema = DATABASE() AND table_name = '\''alembic_version'\''
              ")
              if [ "${HAS_ALEMBIC}" -gt 0 ]; then
                MYSQL_PWD="${MYSQL_PASSWORD}" mysql -u"${MYSQL_USER}" -D "${MYSQL_DATABASE}" -e "
                  ALTER TABLE alembic_version MODIFY version_num VARCHAR(64) NOT NULL
                "
              fi
            '
            sudo "${DOCKER_BIN}" compose -f docker-compose.yml -f docker-compose.prod.yml run --rm --entrypoint="" backend sh -lc 'PYTHONPATH=/app alembic upgrade head'
            sudo "${DOCKER_BIN}" compose -f docker-compose.yml -f docker-compose.prod.yml run --rm --entrypoint="" backend sh -lc 'PYTHONPATH=/app python scripts/seed_user.py'
            sudo "${DOCKER_BIN}" compose -f docker-compose.yml -f docker-compose.prod.yml up -d redis backend worker frontend caddy
            sudo "${DOCKER_BIN}" image prune -f
        env:
          APP_DIR: ${{ secrets.VPS_APP_DIR }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
